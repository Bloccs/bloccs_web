name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - run: mix deps.get
      - run: mix deps.unlock --check-unused

      # format + compile --warnings-as-errors + test
      - run: mix check

      # Fail the build on a stale precompiled bundle: the committed
      # priv/static/assets must match a fresh build from assets/.
      - name: Verify precompiled assets are up to date
        run: |
          mix assets.build
          git diff --exit-code priv/static
